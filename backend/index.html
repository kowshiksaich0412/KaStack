<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conversation RAG Chat</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #172033;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      width: min(920px, 100%);
      height: min(760px, calc(100vh - 48px));
      background: #ffffff;
      border: 1px solid #d9e2ef;
      border-radius: 8px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(25, 39, 66, 0.12);
    }
    header {
      padding: 18px 22px;
      border-bottom: 1px solid #d9e2ef;
      background: #16324f;
      color: #ffffff;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
    }
    #stats {
      margin-top: 8px;
      font-size: 13px;
      color: #d6e5f6;
    }
    #messages {
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8fafc;
    }
    .message {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.45;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .user {
      align-self: flex-end;
      background: #2563eb;
      color: #ffffff;
    }
    .bot {
      align-self: flex-start;
      background: #ffffff;
      border: 1px solid #d9e2ef;
      color: #172033;
    }
    form {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #d9e2ef;
      background: #ffffff;
    }
    input {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid #b9c6d8;
      border-radius: 6px;
      font-size: 15px;
    }
    button {
      width: 96px;
      border: 0;
      border-radius: 6px;
      background: #16324f;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Conversation RAG Chat</h1>
      <div id="stats">Loading system stats...</div>
    </header>
    <section id="messages">
      <div class="message bot">Ask a question about the conversations, topics, personas, or habits.</div>
    </section>
    <form id="chat-form">
      <input id="question" name="question" placeholder="Ask a question..." autocomplete="off" required>
      <button id="send" type="submit">Send</button>
    </form>
  </main>

  <script>
    const statsEl = document.getElementById('stats');
    const messagesEl = document.getElementById('messages');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('question');
    const send = document.getElementById('send');

    function addMessage(text, kind) {
      const node = document.createElement('div');
      node.className = `message ${kind}`;
      node.textContent = text;
      messagesEl.appendChild(node);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return node;
    }

    async function loadStats() {
      try {
        const response = await fetch('/api/stats');
        const data = await response.json();
        statsEl.textContent = `${data.total_messages} messages | ${data.total_topics} topics | ${data.total_checkpoints} checkpoints`;
      } catch {
        statsEl.textContent = 'Stats unavailable';
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, 'user');
      input.value = '';
      send.disabled = true;
      const pending = addMessage('Thinking...', 'bot');

      try {
        const response = await fetch('/api/chatbot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await response.json();
        pending.textContent = response.ok ? data.answer : (data.error || 'Request failed');
      } catch (error) {
        pending.textContent = `Network error: ${error.message}`;
      } finally {
        send.disabled = false;
        input.focus();
      }
    });

    loadStats();
  </script>
</body>
</html>
