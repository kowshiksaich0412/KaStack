services:
  - type: web
    name: kastack-chatbot
    runtime: python
    region: oregon
    autoDeployTrigger: commit
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt && python -m nltk.downloader punkt stopwords vader_lexicon averaged_perceptron_tagger
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
